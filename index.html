<html lang="ko">
<head>
<meta charset="UTF-8"/>

<title>AI 보안링스 - Boanlinks</title>
<meta name="description" content="기업의 보안 파트너, AI 보안링스"/>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
:root{--p:#2563eb;--pd:#1d4ed8;--navy:#0f172a;--bd:#e2e8f0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#f8fafc;color:#0f172a;}
*{font-family:inherit;}
html{scroll-behavior:smooth;scrollbar-gutter:stable;}
.wrap{max-width:1200px;margin:0 auto;padding:0 1.5rem;}
/* Header */
#hdr{position:fixed;top:0;left:0;right:0;z-index:200;transition:all .3s;padding:1rem 0;}
#hdr.solid{background:rgba(255,255,255,.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--bd);box-shadow:0 1px 10px rgba(0,0,0,.07);padding:.5rem 0;}
.nav-a{font-size:.875rem;font-weight:600;background:none;border:none;cursor:pointer;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;transition:color .2s;padding:.25rem 0;color:rgba(255,255,255,.85);}
#hdr.solid .nav-a{color:#334155;}
.nav-a:hover,.nav-a.active{color:var(--p)!important;}
/* Dropdown - click 방식 */
.dd{position:relative;}
.dd-menu{display:none;position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%);background:#fff;border:1px solid var(--bd);border-radius:1rem;box-shadow:0 16px 48px rgba(0,0,0,.18);min-width:210px;overflow:hidden;z-index:500;animation:ddIn .18s ease;}
@keyframes ddIn{from{opacity:0;transform:translateX(-50%) translateY(-6px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.dd.open .dd-menu{display:block;}
.dd-item{display:flex;align-items:center;gap:.75rem;padding:.875rem 1.25rem;cursor:pointer;border:none;background:none;width:100%;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:.875rem;font-weight:500;color:#1e293b;text-align:left;transition:background .15s;}
.dd-item:hover{background:#f1f5f9;color:var(--p);}
.ddot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:.5rem;border:none;cursor:pointer;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-weight:700;transition:all .2s;border-radius:.625rem;}
.btn-p{background:var(--p);color:#fff;padding:.875rem 2rem;font-size:.875rem;box-shadow:0 2px 8px rgba(37,99,235,.25);}
.btn-p:hover{background:var(--pd);transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,99,235,.38);}
.btn-w{background:#fff;color:#0f172a;padding:1rem 2.5rem;font-size:1rem;font-weight:600;border-radius:.75rem;}
.btn-w:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,255,255,.25);}
.btn-o{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.4);padding:1rem 2rem;font-size:.875rem;border-radius:.75rem;}
.btn-o:hover{border-color:rgba(255,255,255,.8);background:rgba(255,255,255,.1);}
.btn-dk{background:#0f172a;color:#fff;padding:.875rem 2rem;font-size:.875rem;}
.btn-dk:hover{background:#1e293b;transform:translateY(-1px);}
.card{background:#fff;border:1px solid var(--bd);border-radius:1rem;transition:transform .3s cubic-bezier(.22,.68,0,1.15),box-shadow .3s,border-color .3s;}
.card:hover{transform:translateY(-5px);box-shadow:0 16px 40px -8px rgba(37,99,235,.15);border-color:rgba(37,99,235,.25);}
.dark{background:#0f172a;color:#e2e8f0;}
/* Hero Slider */
.hero-slider{position:relative;width:100%;overflow:hidden;height:72vh;min-height:480px;max-height:780px;}
.hero-slides{display:flex;transition:transform .6s cubic-bezier(.4,0,.2,1);}
.hero-slide{min-width:100%;position:relative;height:72vh;min-height:480px;max-height:780px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.slide-dot{width:10px;height:10px;border-radius:50%;border:none;cursor:pointer;transition:all .3s;}
/* Solution Tabs */
.stab{padding:.875rem 1.5rem;font-size:.875rem;font-weight:600;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;color:#64748b;white-space:nowrap;}
.stab.on{color:var(--p);border-bottom-color:var(--p);}
.stab:hover{color:var(--p);}
.simg{position:relative;border-radius:1rem;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.1);}
.simg img{width:100%;object-fit:cover;transition:transform .6s;display:block;}
.simg:hover img{transform:scale(1.04);}
.simg-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(15,23,42,.4),transparent 55%);pointer-events:none;}
.simg-badge{position:absolute;bottom:1rem;right:1rem;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.25);border-radius:.75rem;padding:.5rem;}
.fi{display:flex;gap:.75rem;align-items:flex-start;padding:.75rem 1rem;border-radius:.5rem;background:#f8fafc;border-left:3px solid var(--p);font-size:.875rem;line-height:1.65;color:#334155;}
.fdot{width:8px;height:8px;border-radius:50%;background:var(--p);flex-shrink:0;margin-top:.4rem;}
.dev-card{background:#fff;border:1px solid var(--bd);border-radius:1rem;padding:1.5rem;transition:all .3s;}
.dev-card:hover{border-color:var(--p);box-shadow:0 8px 24px rgba(37,99,235,.1);transform:translateY(-3px);}
.nstep{display:flex;gap:1rem;align-items:flex-start;padding:1.25rem;border-radius:.875rem;background:#fff;border:1px solid var(--bd);}
/* Press */
.press-card{background:#fff;border:1px solid var(--bd);border-radius:1.125rem;overflow:hidden;transition:transform .3s cubic-bezier(.22,.68,0,1.15),box-shadow .3s,border-color .3s;cursor:pointer;}
.press-card:hover{transform:translateY(-5px);box-shadow:0 20px 48px -8px rgba(37,99,235,.16);border-color:rgba(37,99,235,.28);}
.press-badge{display:inline-block;padding:.25rem .7rem;border-radius:99px;font-size:.7rem;font-weight:700;letter-spacing:.04em;}
/* Pagination */
.pg-wrap{display:flex;align-items:center;justify-content:center;gap:.375rem;padding:3rem 0 1rem;}
.pg-btn{min-width:40px;height:40px;border-radius:.625rem;border:1.5px solid var(--bd);background:#fff;cursor:pointer;font-size:.875rem;font-weight:700;color:#64748b;display:inline-flex;align-items:center;justify-content:center;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;transition:all .18s;padding:0 .5rem;}
.pg-btn:hover:not(:disabled){border-color:var(--p);color:var(--p);background:#eff6ff;transform:translateY(-1px);}
.pg-btn.active{background:var(--p);color:#fff;border-color:var(--p);box-shadow:0 4px 14px rgba(37,99,235,.35);}
.pg-btn:disabled{opacity:.3;cursor:not-allowed;}
#press-modal{position:fixed;inset:0;z-index:500;display:none;align-items:center;justify-content:center;}
#press-modal.open{display:flex;}
#press-backdrop{position:absolute;inset:0;background:rgba(15,23,42,.7);backdrop-filter:blur(4px);}
#press-box{position:relative;background:#fff;border-radius:1.25rem;max-width:680px;width:calc(100% - 2rem);max-height:85vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2);animation:ddIn .22s ease;}
/* Form */
.ff label{display:block;font-size:.875rem;font-weight:500;color:#334155;margin-bottom:.375rem;}
.ff input,.ff select,.ff textarea{width:100%;padding:.75rem 1rem;border-radius:.5rem;border:1px solid var(--bd);font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:.875rem;color:#0f172a;background:#fff;transition:border-color .2s,box-shadow .2s;}
.ff input:focus,.ff select:focus,.ff textarea:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.ff input.err,.ff textarea.err{border-color:#ef4444;}
.emsg{display:flex;align-items:center;gap:.25rem;color:#ef4444;font-size:.75rem;margin-top:.25rem;}
/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:2.5rem;align-items:center;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:1.25rem;}
@media(max-width:900px){.g2{grid-template-columns:1fr;gap:2rem;}.g3{grid-template-columns:1fr 1fr;}.g4{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){.g3,.g4{grid-template-columns:1fr;}}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.25rem;}
@media(max-width:640px){.fg{grid-template-columns:1fr!important;}}
/* Anim */
@keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
@keyframes floatY{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes pGlow{0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,.3);}50%{box-shadow:0 0 0 10px rgba(37,99,235,0);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes scrollBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(5px);}}
.fu{opacity:0;}.fu.vis{animation:fadeUp .6s cubic-bezier(.22,.68,0,1.1) both;}
.pglow{animation:pGlow 2.5s ease-in-out infinite;}
.spinner{display:inline-block;width:1.1rem;height:1.1rem;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
/* Mobile */
#mob-menu{display:none;background:#fff;border-top:1px solid var(--bd);padding:1rem;box-shadow:0 8px 24px rgba(0,0,0,.1);}
#mob-menu.open{display:block;animation:fadeUp .22s ease;}
.mob-link{display:block;width:100%;text-align:left;padding:.75rem .75rem;background:none;border:none;border-bottom:1px solid #f1f5f9;font-size:.9375rem;color:#334155;cursor:pointer;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;min-height:48px;display:flex;align-items:center;}
.mob-link:hover{color:var(--p);}
.toast{position:fixed;bottom:2rem;right:2rem;z-index:999;background:#fff;border:1px solid var(--bd);border-radius:.75rem;padding:1rem 1.5rem;box-shadow:0 8px 32px rgba(0,0,0,.12);animation:fadeUp .3s ease;}
.flink{display:block;padding:.6rem 1rem;color:rgba(226,232,240,.65);font-size:.8125rem;text-decoration:none;transition:background .15s,color .15s;}
.flink:hover{background:rgba(255,255,255,.08);color:#fff;}
.partner-grad{background:linear-gradient(135deg,#1a1a6e 0%,#2563eb 40%,#7c3aed 70%,#4f46e5 100%);}
.atab{padding:.75rem 1.5rem;font-size:.875rem;font-weight:600;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;color:#64748b;transition:all .2s;white-space:nowrap;}
.atab.on{color:var(--p);border-bottom-color:var(--p);}
.atab:hover{color:var(--p);}
/* Chatbot */
#chat-btn{position:fixed;top:80px;right:24px;z-index:500;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--p),#7c3aed);border:none;cursor:pointer;box-shadow:0 4px 20px rgba(37,99,235,.4);display:flex;align-items:center;justify-content:center;transition:box-shadow .15s;transform:translateZ(0);}
#chat-btn:hover{box-shadow:0 6px 28px rgba(37,99,235,.5);}
#chat-btn:active{box-shadow:0 2px 12px rgba(37,99,235,.3);}
@keyframes chatIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
#chat-window{position:fixed;top:146px;right:24px;z-index:500;width:360px;max-width:calc(100vw - 2rem);background:#fff;border-radius:1.25rem;box-shadow:0 20px 60px rgba(0,0,0,.18);border:1px solid var(--bd);display:none;flex-direction:column;overflow:hidden;animation:chatIn .22s ease;}
#chat-window.open{display:flex;}
@media(max-width:480px){
  #chat-btn{top:70px;right:16px;width:52px;height:52px;}
  #chat-window{top:130px;right:.5rem;left:.5rem;width:auto;max-width:100%;border-radius:1rem;}
  #chat-msgs{max-height:55vh;}
}
@media(max-width:900px) and (min-width:481px){
  #chat-window{width:340px;right:1rem;top:146px;}
}
#chat-msgs{flex:1;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:.75rem;max-height:400px;}
.chat-msg{max-width:85%;padding:.75rem 1rem;border-radius:1rem;font-size:.875rem;line-height:1.6;}
.chat-msg.bot{background:#f1f5f9;color:#334155;align-self:flex-start;border-bottom-left-radius:.25rem;}
.chat-msg.user{background:var(--p);color:#fff;align-self:flex-end;border-bottom-right-radius:.25rem;}
.chat-typing{display:flex;gap:.25rem;align-items:center;padding:.75rem 1rem;}
.chat-typing span{width:7px;height:7px;border-radius:50%;background:#94a3b8;animation:bounce .8s ease-in-out infinite;}
.chat-typing span:nth-child(2){animation-delay:.15s;}
.chat-typing span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0);}40%{transform:translateY(-6px);}}
/* Footer */
.footer-main{background:#0f172a;border-top:1px solid rgba(255,255,255,.06);}
@media(max-width:768px){#desk-nav{display:none;}#mob-btn{display:block!important;}}
@media(min-width:769px){#mob-btn{display:none!important;}}
@media(max-width:768px){.press-card.feature{display:block!important;}}

/* ── RESPONSIVE: Tablet (768px) ── */
@media(max-width:900px){
  .footer-grid{grid-template-columns:1fr 1fr!important;gap:2rem!important;}
  .stats-grid{grid-template-columns:1fr 1fr!important;}
  .about-stats-grid{grid-template-columns:1fr 1fr!important;}
  .solution-feature-grid{grid-template-columns:1fr!important;}
  .sol-img-col{min-height:220px!important;}
  .hero-slide{min-height:75vh!important;}
}

/* ── RESPONSIVE: Mobile (600px) ── */
@media(max-width:600px){
  .footer-grid{grid-template-columns:1fr!important;gap:1.5rem!important;}
  .stats-grid{grid-template-columns:1fr 1fr!important;}
  .hero-slide{min-height:65vh!important;padding:0 .5rem;}
  .hero-slide h1{font-size:1.75rem!important;line-height:1.2!important;}
  .hero-slide p{font-size:.875rem!important;}
  .hero-cta{flex-direction:column!important;align-items:center!important;}
  .hero-cta button{width:100%!important;max-width:280px;}
  .wrap{padding-left:.875rem!important;padding-right:.875rem!important;}
  .page-section{padding:4rem 0 2rem!important;}
  .sol-card{flex-direction:column!important;}
  .sol-img-col{min-height:200px!important;order:0!important;}
  .about-stats-grid{grid-template-columns:1fr 1fr!important;}
  .press-grid{grid-template-columns:1fr!important;}
  #chat-window{width:calc(100vw - 1rem)!important;right:.5rem!important;top:130px!important;bottom:auto!important;}
  #chat-btn{top:70px!important;right:1rem!important;bottom:auto!important;}
  .mob-menu-inner{padding:.5rem!important;}
  .section-pad{padding:3rem 0!important;}
  .contact-grid{grid-template-columns:1fr!important;}
  .card-grid-3{grid-template-columns:1fr!important;}
  .tab-bar{overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap;}
  .tab-bar button{white-space:nowrap;}
  h2.section-title{font-size:1.5rem!important;}
}

/* ── Hero text responsive ── */
@media(max-width:600px){
  .hero-h1{font-size:clamp(1.5rem,6vw,2rem)!important;}
  .hero-sub{font-size:.875rem!important;padding:0 .5rem;}
  .hero-cta{gap:.5rem!important;}
  .hero-cta button{font-size:.8125rem!important;padding:.75rem 1.25rem!important;}
}

/* ── RESPONSIVE: Small mobile (400px) ── */
@media(max-width:400px){
  .hero-slide{min-height:60vh!important;}
  .hero-slide h1{font-size:1.5rem!important;}
  .footer-grid{gap:1rem!important;}
}
</style>

function initVaultCanvas(){
  const canvas=document.getElementById('vault-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  function resize(){canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;}
  resize();
  window.addEventListener('resize',resize);
  // Hexagonal grid + lock icons feel: floating encrypted data blocks
  const blocks=Array.from({length:30},()=>({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height,
    w:Math.random()*60+30, h:Math.random()*40+20,
    vx:(Math.random()-.5)*.25, vy:(Math.random()-.5)*.25,
    alpha:Math.random()*.4+.05,
    pulse:Math.random()*Math.PI*2,
    color:Math.random()>.5?'96,165,250':'167,139,250'
  }));
  // Falling hex symbols
  const hexSyms=['⬡','⬢','◈','▣','◆'];
  const cols2=Math.floor(canvas.width/36);
  const drops2=Array.from({length:cols2},()=>Math.random()*canvas.height/20);
  function draw(){
    ctx.fillStyle='rgba(30,27,75,.15)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    // Falling symbols
    ctx.font='14px monospace';
    for(let i=0;i<drops2.length;i++){
      const sym=hexSyms[Math.floor(Math.random()*hexSyms.length)];
      const al=Math.random()*.25+.04;
      ctx.fillStyle=`rgba(167,139,250,${al})`;
      ctx.fillText(sym,i*36,drops2[i]*20);
      if(drops2[i]*20>canvas.height&&Math.random()>.98)drops2[i]=0;
      else drops2[i]+=.5;
    }
    // Glowing data blocks (safe/vault feel)
    for(const b of blocks){
      b.x+=b.vx; b.y+=b.vy;
      if(b.x<-b.w)b.x=canvas.width;else if(b.x>canvas.width)b.x=-b.w;
      if(b.y<-b.h)b.y=canvas.height;else if(b.y>canvas.height)b.y=-b.h;
      b.pulse+=.02;
      const glow=(Math.sin(b.pulse)*.5+.5);
      ctx.strokeStyle=`rgba(${b.color},${b.alpha+glow*.12})`;
      ctx.lineWidth=1;
      ctx.strokeRect(b.x,b.y,b.w,b.h);
      // Lock icon inside block (simple)
      const cx2=b.x+b.w/2, cy2=b.y+b.h/2;
      ctx.beginPath();
      ctx.arc(cx2,cy2-4,4,Math.PI,0);
      ctx.strokeStyle=`rgba(${b.color},${b.alpha*.8})`;
      ctx.stroke();
      ctx.strokeRect(cx2-5,cy2-2,10,8);
    }
    // Radial pulse from center
    const pulse=((Date.now()%3000)/3000);
    const r=pulse*Math.min(canvas.width,canvas.height)*.6;
    const grad=ctx.createRadialGradient(canvas.width/2,canvas.height/2,0,canvas.width/2,canvas.height/2,r);
    grad.addColorStop(0,'rgba(99,102,241,0)');
    grad.addColorStop(.8,`rgba(99,102,241,${(1-pulse)*.04})`);
    grad.addColorStop(1,'rgba(99,102,241,0)');
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    requestAnimationFrame(draw);
  }
  draw();
}

function initTrustCanvas(){
  const canvas=document.getElementById('trust-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  function resize(){canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;}
  resize();
  window.addEventListener('resize',resize);
  // Green circuit board / trust chain: traces + nodes
  const traces=Array.from({length:25},()=>({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height,
    len:Math.random()*120+40,
    dir:Math.floor(Math.random()*4),// 0=right,1=down,2=left,3=up
    alpha:Math.random()*.3+.05,
    pulse:Math.random()*Math.PI*2,
    speed:.015
  }));
  const dots=Array.from({length:50},()=>({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height,
    r:Math.random()*3+1,
    pulse:Math.random()*Math.PI*2,
    color:Math.random()>.5?'52,211,153':'16,185,129'
  }));
  function draw(){
    ctx.fillStyle='rgba(6,30,20,.14)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    // Circuit traces
    for(const t of traces){
      t.pulse+=t.speed;
      const glow=Math.sin(t.pulse)*.5+.5;
      ctx.beginPath();
      const dirs=[[1,0],[0,1],[-1,0],[0,-1]];
      const[dx,dy]=dirs[t.dir];
      ctx.moveTo(t.x,t.y);
      ctx.lineTo(t.x+dx*t.len,t.y+dy*t.len);
      ctx.strokeStyle=`rgba(52,211,153,${t.alpha*(glow*.6+.4)})`;
      ctx.lineWidth=1;
      ctx.stroke();
      // Moving pulse dot along trace
      const progress=(Math.sin(t.pulse)*.5+.5);
      const px=t.x+dx*t.len*progress;
      const py=t.y+dy*t.len*progress;
      ctx.beginPath();
      ctx.arc(px,py,2.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(110,231,183,${.7+glow*.3})`;
      ctx.fill();
    }
    // Glowing nodes
    for(const d of dots){
      d.pulse+=.025;
      const g=Math.sin(d.pulse)*.5+.5;
      ctx.beginPath();
      ctx.arc(d.x,d.y,d.r+g,0,Math.PI*2);
      ctx.fillStyle=`rgba(${d.color},${.4+g*.5})`;
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
}
function initSecurityCanvas(){
  const canvas=document.getElementById('security-canvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  function resize(){canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;}
  resize();
  window.addEventListener('resize',resize);
  // Particles: floating nodes + connection lines (network security feel)
  const nodes=Array.from({length:60},()=>({
    x:Math.random()*canvas.width,y:Math.random()*canvas.height,
    vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,
    r:Math.random()*2+1,
    pulse:Math.random()*Math.PI*2
  }));
  // Binary rain columns
  const cols=Math.floor(canvas.width/20);
  const drops=Array.from({length:cols},()=>Math.random()*canvas.height/14);
  let frame=0;
  function draw(){
    frame++;
    // Fade
    ctx.fillStyle='rgba(6,13,31,.18)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    // Binary rain
    ctx.font='11px monospace';
    for(let i=0;i<drops.length;i++){
      const char=Math.random()>.5?'1':'0';
      const alpha=Math.random()*.35+.05;
      ctx.fillStyle=`rgba(96,165,250,${alpha})`;
      ctx.fillText(char,i*20,drops[i]*14);
      if(drops[i]*14>canvas.height&&Math.random()>.97)drops[i]=0;
      else drops[i]++;
    }
    // Network nodes
    for(let i=0;i<nodes.length;i++){
      const n=nodes[i];
      n.x+=n.vx; n.y+=n.vy;
      if(n.x<0||n.x>canvas.width)n.vx*=-1;
      if(n.y<0||n.y>canvas.height)n.vy*=-1;
      n.pulse+=.03;
      const glow=Math.sin(n.pulse)*.5+.5;
      // Draw connections
      for(let j=i+1;j<nodes.length;j++){
        const m=nodes[j];
        const dx=m.x-n.x,dy=m.y-n.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<120){
          ctx.beginPath();
          ctx.moveTo(n.x,n.y);ctx.lineTo(m.x,m.y);
          ctx.strokeStyle=`rgba(99,179,255,${(.4-dist/300)*(glow*.5+.5)})`;
          ctx.lineWidth=.5;
          ctx.stroke();
        }
      }
      // Draw node
      ctx.beginPath();
      ctx.arc(n.x,n.y,n.r+glow,0,Math.PI*2);
      ctx.fillStyle=`rgba(147,197,253,${.6+glow*.4})`;
      ctx.fill();
    }
    // Shield icon glow in center (subtle)
    if(frame%60===0){
      const cx=canvas.width/2,cy=canvas.height/2;
      const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,200);
      grad.addColorStop(0,'rgba(37,99,235,.08)');
      grad.addColorStop(1,'rgba(37,99,235,0)');
      ctx.fillStyle=grad;
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }
    requestAnimationFrame(draw);
  }
  draw();
}

function bindChat(){
  const inp=document.getElementById('chat-inp'),btn=document.getElementById('chat-send');
  if(!inp||!btn)return;
  const send=()=>{
    const q=inp.value.trim();if(!q||S.chatLoading)return;
    S.chatMsgs.push({role:'user',text:q});inp.value='';S.chatLoading=true;renderChat();
    setTimeout(()=>{
      const ans=chatAnswer(q);
      S.chatMsgs.push({role:'bot',text:ans});
      S.chatLoading=false;renderChat();
    },600);
  };
  btn.onclick=send;
  inp.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};
}

/* ════════════ PRESS ════════════ */
function pagePress(){
  const cats=['all','뉴스','보도자료','수상'];
  const filtered=S.pressFilter==='all'?PRESS:PRESS.filter(p=>p.cat===S.pressFilter);
  const cc=cat=>({'뉴스':'#2563eb','보도자료':'#059669','수상':'#d97706'}[cat]||'#64748b');
  const PER=9;
  const total=Math.max(1,Math.ceil(filtered.length/PER));
  const pg=Math.min(Math.max(1,S.pressPage),total);
  const items=filtered.slice((pg-1)*PER, pg*PER);
  const isFirst=pg===1;

  // 페이지네이션 버튼
  function pgHtml(){
    if(total<=1)return'';
    const range=5,half=Math.floor(range/2);
    let s=Math.max(1,pg-half),e=Math.min(total,s+range-1);
    if(e-s<range-1)s=Math.max(1,e-range+1);
    let b=`<button class="pg-btn" onclick="S.pressPage=1;render();" ${pg===1?'disabled':''}>«</button>`;
    b+=`<button class="pg-btn" onclick="S.pressPage=${pg-1};render();" ${pg===1?'disabled':''}>‹</button>`;
    for(let i=s;i<=e;i++)b+=`<button class="pg-btn ${i===pg?'active':''}" onclick="S.pressPage=${i};render();">${i}</button>`;
    b+=`<button class="pg-btn" onclick="S.pressPage=${pg+1};render();" ${pg===total?'disabled':''}>›</button>`;
    b+=`<button class="pg-btn" onclick="S.pressPage=${total};render();" ${pg===total?'disabled':''}>»</button>`;
    return`<div class="pg-wrap">${b}</div>`;
  }

  // 개별 카드 렌더
  const cardHtml=p=>`<div class="press-card fu" onclick="goToPress(${p.id})">
    <div style="padding:1.5rem 1.5rem 0;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;">
        <span class="press-badge" style="background:${cc(p.cat)}15;color:${cc(p.cat)};">${p.cat}</span>
        <span style="font-size:.75rem;color:#94a3b8;">${p.date||''}</span>
      </div>
      <h3 style="font-size:.9375rem;font-weight:700;color:#0f172a;line-height:1.5;margin-bottom:.625rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${p.title}</h3>
      <p style="font-size:.8125rem;color:#64748b;line-height:1.65;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${(p.summary||'').substring(0,80)}…</p>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:.875rem 1.5rem;margin-top:.75rem;border-top:1px solid #f1f5f9;">
      <span style="font-size:.75rem;color:#94a3b8;">${p.source||''}</span>
      <span style="font-size:.8125rem;font-weight:700;color:var(--p);">더 보기 →</span>
    </div>
  </div>`;

  return`<div style="min-height:100vh;background:#f8fafc;">
  <section class="dark" style="padding:7rem 0 3rem;position:relative;background-image:linear-gradient(rgba(15,23,42,.84),rgba(15,23,42,.92)),url(https://images.unsplash.com/photo-1504868584819-f8e8b4b6d7e3?w=1600&q=80);background-size:cover;background-position:center;">
    <div class="wrap" style="text-align:center;">
      <span style="color:#93c5fd;font-size:.8125rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;" class="fu">Press Center</span>
      <h1 style="font-size:clamp(1.375rem,2.5vw,1.875rem);font-weight:500;color:#fff;margin-top:.75rem;letter-spacing:-.02em;" class="fu">홍보센터</h1>
      <p style="color:rgba(226,232,240,.6);margin-top:.75rem;" class="fu">AI 보안링스의 최신 뉴스와 보도자료를 확인하세요.</p>
    </div>
  </section>
  <div style="background:#fff;border-bottom:1px solid var(--bd);position:sticky;top:52px;z-index:40;">
    <div class="wrap" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;padding-top:.25rem;padding-bottom:.25rem;">
      <div style="display:flex;overflow-x:auto;">
        ${cats.map(c=>`<button onclick="S.pressFilter='${c}';S.pressPage=1;render();" style="padding:.875rem 1.25rem;font-size:.875rem;font-weight:600;background:none;border:none;border-bottom:2px solid ${S.pressFilter===c?'var(--p)':'transparent'};cursor:pointer;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;color:${S.pressFilter===c?'var(--p)':'#64748b'};white-space:nowrap;transition:all .2s;">${c==='all'?'전체':c}</button>`).join('')}
      </div>
      <span style="font-size:.8125rem;color:#94a3b8;padding-right:.5rem;">${filtered.length}건 · ${pg}/${total}페이지</span>
    </div>
  </div>
  <div class="wrap" style="padding:3rem 1.5rem 4rem;">
    ${items.length===0?`<div style="text-align:center;padding:5rem;color:#94a3b8;"><p>해당 카테고리의 기사가 없습니다.</p></div>`:`
    ${isFirst&&items.length>0?`

        <div style="padding:2.5rem;display:flex;flex-direction:column;justify-content:center;background:#fff;">
